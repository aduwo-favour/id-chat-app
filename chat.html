<!DOCTYPE html>
<html>
<head>
  <title>Chat</title>
  <meta charset="UTF-8">
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#667eea">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, height=device-height">
  <link rel="stylesheet" href="style.css">
</head>
<body class="chat-page">

<div class="chat-wrapper">
  <div class="chat-header-fixed">
    <div class="chat-header-left">
      <button onclick="goBack()" class="back-btn">←</button>
      <div class="chat-user-info">
        <h3 id="chatUserName">Loading...</h3>
        <div class="user-status" id="userStatus">Offline</div>
        <div class="last-seen" id="lastSeen"></div>
      </div>
    </div>

    <div class="chat-header-right">
      <div class="lang-selector-wrap">
        <select id="chatLangSelect" title="Translate incoming messages" onchange="changeChatLanguage(this.value)">
          <option value="">🌐</option>
          <option value="en">🇬🇧 EN</option>
          <option value="fr">🇫🇷 FR</option>
          <option value="es">🇪🇸 ES</option>
          <option value="de">🇩🇪 DE</option>
          <option value="it">🇮🇹 IT</option>
          <option value="pt">🇧🇷 PT</option>
          <option value="ru">🇷🇺 RU</option>
          <option value="ar">🇸🇦 AR</option>
          <option value="zh">🇨🇳 ZH</option>
          <option value="ja">🇯🇵 JA</option>
          <option value="ko">🇰🇷 KO</option>
          <option value="hi">🇮🇳 HI</option>
          <option value="yo">YO</option>
          <option value="ig">IG</option>
          <option value="ha">HA</option>
        </select>
      </div>
      <button onclick="toggleChatOptions()" class="options-btn" id="optionsBtn">⚙️</button>
    </div>
  </div>

  <div id="chatOptions" class="chat-options-dropdown hidden">
    <button onclick="unfriendUser()" class="option-btn danger">Unfriend</button>
    <button onclick="blockUser()" class="option-btn danger">Block Messages</button>
  </div>

  <div id="messagesContainer" class="messages-container"></div>

  <div id="replyPreview" class="reply-preview hidden">
    <span>Replying to: </span>
    <span id="replyText"></span>
    <button onclick="cancelReply()" class="cancel-reply">✕</button>
  </div>

  <div class="chat-input-fixed">
    <input type="text" id="messageInput" placeholder="Type a message..." autocomplete="off">
    <button onclick="sendMessage()" id="sendBtn">Send</button>
  </div>
</div>

<script>
  document.addEventListener('click', function(event) {
    const options = document.getElementById('chatOptions');
    const optionsBtn = document.getElementById('optionsBtn');
    if (options && optionsBtn && !options.contains(event.target) && !optionsBtn.contains(event.target)) {
      options.classList.add('hidden');
    }
  });
</script>

<style>
  .lang-selector-wrap select {
    background: rgba(255,255,255,0.2);
    border: 1px solid rgba(255,255,255,0.3);
    color: white;
    border-radius: 8px;
    padding: 5px 6px;
    font-size: 0.8rem;
    cursor: pointer;
    outline: none;
  }
  .lang-selector-wrap select option {
    background: #333;
    color: white;
  }
</style>

<script type="module" src="firebase.js"></script>
<script type="module" src="chat.js"></script>
</body>
</html>
