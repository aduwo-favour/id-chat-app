<!DOCTYPE html>
<html>
<head>
  <title>Community Chat</title>
  <meta charset="UTF-8">
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#667eea">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, height=device-height">
  <link rel="stylesheet" href="style.css">
  <style>
    /* Kill any Google Translate injected elements */
    .goog-te-banner-frame, .skiptranslate, #goog-gt-tt, .goog-te-balloon-frame { display: none !important; }
    body { top: 0 !important; }
    .chat-wrapper { height: 100dvh !important; }
    .lang-selector-wrap select {
      background: rgba(255,255,255,0.2);
      border: 1px solid rgba(255,255,255,0.3);
      color: white;
      border-radius: 8px;
      padding: 5px 6px;
      font-size: 0.8rem;
      cursor: pointer;
      outline: none;
    }
    .lang-selector-wrap select option { background: #333; color: white; }
  </style>
</head>
<body class="community-chat-page">

<div class="chat-wrapper">
  <div class="chat-header-fixed">
    <div class="chat-header-left">
      <button onclick="goBack()" class="back-btn">←</button>
      <div class="chat-user-info">
        <h3 id="communityName">Loading...</h3>
        <div class="community-stats">
          <span id="onlineCount">0</span> online · <span id="totalMembers">0</span> members
        </div>
      </div>
    </div>

    <div class="chat-header-right">
      <div class="lang-selector-wrap">
        <select id="commLangSelect" title="Translate incoming messages" onchange="changeChatLanguage(this.value)">
          <option value="">🌐</option>
          <option value="en">🇬🇧 EN</option>
          <option value="fr">🇫🇷 FR</option>
          <option value="es">🇪🇸 ES</option>
          <option value="de">🇩🇪 DE</option>
          <option value="it">🇮🇹 IT</option>
          <option value="pt">🇧🇷 PT</option>
          <option value="ru">🇷🇺 RU</option>
          <option value="ar">🇸🇦 AR</option>
          <option value="zh">🇨🇳 ZH</option>
          <option value="ja">🇯🇵 JA</option>
          <option value="ko">🇰🇷 KO</option>
          <option value="hi">🇮🇳 HI</option>
          <option value="yo">YO</option>
          <option value="ig">IG</option>
          <option value="ha">HA</option>
          <option value="pl">🇵🇱 PL</option>
        </select>
      </div>
      <button onclick="toggleCommunityOptions()" class="options-btn" id="optionsBtn">⚙️</button>
    </div>
  </div>

  <div id="communityOptions" class="chat-options-dropdown hidden">
    <button onclick="viewMembers()" class="option-btn">👥 View Members</button>
    <button onclick="viewMyRequests()" class="option-btn">📋 My Requests</button>
    <button onclick="leaveCommunity()" class="option-btn danger" id="leaveBtn">Leave Community</button>
  </div>

  <div id="adminOptions" class="chat-options-dropdown admin-only hidden">
    <div class="admin-header">Admin Controls</div>
    <button onclick="manageRequests()" class="option-btn">📨 Manage Requests</button>
    <button onclick="manageMembers()" class="option-btn">👑 Manage Members</button>
    <button onclick="editCommunity()" class="option-btn">✏️ Edit Community</button>
    <button onclick="leaveCommunity()" class="option-btn danger">🗑️ Delete Community</button>
  </div>

  <div id="messagesContainer" class="messages-container"></div>

  <div id="replyPreview" class="reply-preview hidden">
    <span>Replying to: </span>
    <span id="replyText"></span>
    <button onclick="cancelReply()" class="cancel-reply">✕</button>
  </div>

  <div class="chat-input-fixed" id="chatInputArea">
    <input type="text" id="messageInput" placeholder="Type a message..." name="chatmessage" autocomplete="off" autocorrect="off" autocapitalize="sentences" spellcheck="false" inputmode="text" enterkeyhint="send" data-form-type="other" data-lpignore="true" data-1p-ignore disabled>
    <button onclick="sendMessage()" id="sendBtn" disabled>Send</button>
  </div>
</div>

<div id="membersModal" class="modal hidden">
  <div class="modal-content large">
    <div class="modal-header">
      <h3>Community Members</h3>
      <button onclick="hideModal('membersModal')" class="close-btn">✕</button>
    </div>
    <div class="modal-body">
      <div class="members-tabs">
        <button class="tab-btn active" onclick="switchMembersTab('all')" id="allTab">All Members</button>
        <button class="tab-btn" onclick="switchMembersTab('online')" id="onlineTab">Online</button>
        <button class="tab-btn" onclick="switchMembersTab('admins')" id="adminsTab">Admins</button>
      </div>
      <div id="membersList" class="members-list"></div>
    </div>
  </div>
</div>

<div id="requestsModal" class="modal hidden">
  <div class="modal-content">
    <div class="modal-header">
      <h3>Join Requests</h3>
      <button onclick="hideModal('requestsModal')" class="close-btn">✕</button>
    </div>
    <div class="modal-body">
      <div id="requestsList" class="requests-list"></div>
    </div>
  </div>
</div>

<div id="manageMembersModal" class="modal hidden">
  <div class="modal-content large">
    <div class="modal-header">
      <h3>Manage Members</h3>
      <button onclick="hideModal('manageMembersModal')" class="close-btn">✕</button>
    </div>
    <div class="modal-body">
      <div class="members-tabs">
        <button class="tab-btn active" onclick="switchManageTab('members')" id="manageTabMembers">Members</button>
        <button class="tab-btn" onclick="switchManageTab('banned')" id="manageTabBanned">🚫 Banned</button>
      </div>
      <div id="manageMembersPanel">
        <input type="text" id="searchMember" placeholder="Search members..." class="search-input">
        <div id="manageMembersList" class="members-list"></div>
      </div>
      <div id="manageBannedPanel" style="display:none">
        <div id="manageBannedList" class="members-list"></div>
      </div>
    </div>
  </div>
</div>


<script>
  document.addEventListener('click', function(event) {
    const options = document.getElementById('communityOptions');
    const adminOptions = document.getElementById('adminOptions');
    const optionsBtn = document.getElementById('optionsBtn');
    
    if (options && !options.contains(event.target) && !optionsBtn.contains(event.target)) {
      options.classList.add('hidden');
    }
    if (adminOptions && !adminOptions.contains(event.target) && !optionsBtn.contains(event.target)) {
      adminOptions.classList.add('hidden');
    }
  });
</script>

<script type="module" src="firebase.js"></script>
<script type="module" src="community-chat.js"></script>

<div id="editCommunityModal" class="modal hidden">
  <div class="modal-content">
    <div class="modal-header">
      <h3>✏️ Edit Community</h3>
      <button onclick="hideModal('editCommunityModal')" class="close-btn">✕</button>
    </div>
    <div class="modal-body">
      <div class="edit-field">
        <label>Community Name</label>
        <input type="text" id="editName" maxlength="40" placeholder="Community name">
      </div>
      <div class="edit-field">
        <label>Description</label>
        <textarea id="editDescription" maxlength="200" placeholder="What is this community about?" rows="3"></textarea>
      </div>
      <div class="edit-field">
        <label>Type</label>
        <select id="editType">
          <option value="public">🌍 Public — anyone can join</option>
          <option value="private">🔒 Private — approval required</option>
        </select>
      </div>
      <div class="edit-field">
        <label>Avatar Color</label>
        <div class="color-picker" id="colorPicker">
          <div class="color-swatch selected" data-color="#667eea" style="background:#667eea"></div>
          <div class="color-swatch" data-color="#e53e3e" style="background:#e53e3e"></div>
          <div class="color-swatch" data-color="#38a169" style="background:#38a169"></div>
          <div class="color-swatch" data-color="#f57c00" style="background:#f57c00"></div>
          <div class="color-swatch" data-color="#d53f8c" style="background:#d53f8c"></div>
          <div class="color-swatch" data-color="#0bc5ea" style="background:#0bc5ea"></div>
          <div class="color-swatch" data-color="#805ad5" style="background:#805ad5"></div>
          <div class="color-swatch" data-color="#2d3748" style="background:#2d3748"></div>
        </div>
      </div>
      <div class="edit-field">
        <label>Welcome Message <span style="font-size:0.75rem;color:#888">(shown to new members)</span></label>
        <textarea id="editWelcome" maxlength="200" placeholder="Welcome to our community! 👋" rows="2"></textarea>
      </div>
      <button onclick="saveEditCommunity()" class="save-edit-btn">Save Changes</button>
    </div>
  </div>
</div>
</body>
</html>
